<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
     <link rel="icon" href="hos.png" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .forgot-box {
            background: #ffffff;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .forgot-box h2 {
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .forgot-box p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        .input-box {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-box label {
            font-size: 14px;
            color: #333;
        }

        .input-box input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .reset-btn {
            width: 100%;
            padding: 10px;
            background: #2a5298;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .reset-btn:hover {
            background: #1e3c72;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            text-decoration: none;
            color: #2a5298;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="forgot-box">
    <h2>Forgot Password</h2>
    <p>Enter your registered email to reset your password.</p>

    <form action="#">
        <div class="input-box">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="reset-btn">Reset Password</button>
    </form>

    <a href="login.html" class="back-link">Back to Login</a>
</div>

</body>
</html>
