<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Novamed Patient Registration</title>
    <link rel="icon" href="hos.png" type="image/x-icon">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page-split {
            display: flex;
            width: 90%;
            max-width: 900px;
            min-height: 650px;
            background: transparent;
            overflow: hidden;
            gap: 0;
        }

        .image-panel {
            width: 45%;
            background: #dbe3ec;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-radius: 20px 0 0 20px;
            overflow: hidden;
        }

        .image-panel img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
        }

        .registration-card {
            width: 50%;
            background: #ffffff;
            border-radius: 0 20px 20px 0;
            padding: 40px 44px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .registration-card h3 {
            margin: 0 0 28px;
            font-size: 24px;
            text-align: center;
            color: #111827;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 0;
            background: #f8fafc;
            color: #111827;
            font-size: 14px;
        }

        textarea {
            min-height: 70px;
            /* reduced height */
            max-height: 120px;
            /* optional limit */
            resize: vertical;
        }

        select {
            appearance: none;
            background-image: linear-gradient(45deg, transparent 50%, #6b7280 50%),
                linear-gradient(135deg, #6b7280 50%, transparent 50%);
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px);
            background-size: 5px 5px, 5px 5px;
            background-repeat: no-repeat;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 8px;
        }

        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            cursor: pointer;
        }

        .radio-group input {
            margin: 0;
        }

        .submit-btn {
            width: 100%;
            padding: 14px 16px;
            margin-top: 8px;
            border: none;
            border-radius: 14px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .login-link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .page-split {
                flex-direction: column;
                width: 100%;
                min-height: auto;
            }

            .image-panel,
            .registration-card {
                width: 100%;
            }

            .image-panel {
                min-height: 320px;
                padding: 24px;
            }

            .registration-card {
                border-radius: 0 0 20px 20px;
                padding: 28px 24px;
                max-width: 100%;
            }
        }

        @media (max-width: 560px) {
            .registration-card {
                border-radius: 18px;
                padding: 24px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page-split">
        <div class="image-panel">
            <img src="pat1.png" alt="Patient Illustration">
        </div>
        <div class="registration-card">
            <h3>Patient Registration</h3>
            <form action="patient_reg.html">
                <div class="form-grid">
                    <div class="form-group full">
                        <label for="full-name">Full Name *</label>
                        <input id="full-name" type="text" name="patient_name" placeholder="Enter full name" required>
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <input id="age" type="number" name="age" placeholder="Enter age">
                    </div>

                    <div class="form-group">
                        <label for="blood-group">Blood Group</label>
                        <select id="blood-group" name="blood_group">
                            <option value="">Select blood group</option>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>O+</option>
                            <option>O-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="Male" checked> Male</label>
                            <label><input type="radio" name="gender" value="Female"> Female</label>
                            <label><input type="radio" name="gender" value="Other"> Other</label>
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="phone">Phone Number *</label>
                        <input id="phone" type="tel" name="phone" placeholder="Enter phone number" required>
                    </div>

                    <div class="form-group full">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" placeholder="Enter address"></textarea>
                    </div>


                    <div class="form-group full">
                        <label for="documents">Upload Documents</label>
                        <input id="documents" type="file" name="documents">
                    </div>
                </div>

                <button type="submit" class="submit-btn">Register</button>
            </form>
            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
</body>

</html>
